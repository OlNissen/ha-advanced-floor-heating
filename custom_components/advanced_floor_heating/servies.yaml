set_room_temperature:
  name: Set Room Target Temperature
  description: Sets the target room temperature for the Advanced Floor Heating entity.
  target:
    entity:
      domain: climate
  fields:
    temperature:
      name: Temperature
      description: The target room temperature to set.
      required: true
      example: 21.5
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: slider

set_floor_temperature:
  name: Set Floor Target Temperature
  description: Sets the target floor temperature for the Advanced Floor Heating entity.
  target:
    entity:
      domain: climate
  fields:
    temperature:
      name: Temperature
      description: The target floor temperature to set.
      required: true
      example: 24.0
      selector:
        number:
          min: 15
          max: 35
          step: 0.5
          unit_of_measurement: "°C"
          mode: slider